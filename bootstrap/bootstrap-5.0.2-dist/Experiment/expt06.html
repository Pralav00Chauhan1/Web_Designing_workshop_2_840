<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Manipulation</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 30px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 0px 10px gray;
            text-align: center;
        }

        h1 {
            color: darkblue;
        }

        p {
            font-size: 18px;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 15px 0;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            margin: 8px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background-color: darkblue;
        }

    </style>
</head>

<body>

<div class="container">

    <h1 id="heading">DOM Manipulation Example</h1>

    <p id="paragraph">
        This is a sample paragraph for DOM manipulation.
    </p>

    <input type="text" id="userInput" placeholder="Enter new heading text">

    <br>

    <button onclick="changeText()">Change Heading</button>

    <button onclick="changeStyle()">Change Style</button>

    <button onclick="toggleParagraph()">Show / Hide Paragraph</button>

    <button onclick="resetPage()">Reset</button>

</div>

<script>

    // Change Heading Text
    function changeText() {

        let text = document.getElementById("userInput").value;

        document.getElementById("heading").innerHTML = text;
    }

    // Change Background Color and Font Size
    function changeStyle() {

        document.body.style.backgroundColor = "lightblue";

        document.getElementById("paragraph").style.fontSize = "24px";
    }

    // Show or Hide Paragraph
    function toggleParagraph() {

        let para = document.getElementById("paragraph");

        if (para.style.display === "none") {
            para.style.display = "block";
        }
        else {
            para.style.display = "none";
        }
    }

    // Reset Page
    function resetPage() {

        document.body.style.backgroundColor = "#f2f2f2";

        document.getElementById("heading").innerHTML =
            "DOM Manipulation Example";

        document.getElementById("paragraph").style.fontSize = "18px";

        document.getElementById("paragraph").style.display = "block";

        document.getElementById("userInput").value = "";
    }

</script>

</body>
</html>
