 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 30px;
        }

        .container {
            max-width: 500px;
            background: white;
            padding: 25px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }

        #output {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Student Grade Calculator</h1>

        <button onclick="calculateResult()">
            Enter Marks
        </button>

        <div id="output"></div>

    </div>

    <script>

        function calculateResult() {

            // Input number of subjects
            let subjects = parseInt(prompt("Enter number of subjects:"));

            let total = 0;

            // Loop for entering marks
            for (let i = 1; i <= subjects; i++) {

                let marks = parseFloat(prompt("Enter marks for Subject " + i + ":"));

                total = total + marks;
            }

            // Calculate average
            let average = total / subjects;

            let grade = "";
            let result = "";

            // Conditional statements for grade
            if (average >= 90) {
                grade = "A+";
                result = "Pass";
            }
            else if (average >= 75) {
                grade = "A";
                result = "Pass";
            }
            else if (average >= 60) {
                grade = "B";
                result = "Pass";
            }
            else if (average >= 40) {
                grade = "C";
                result = "Pass";
            }
            else {
                grade = "F";
                result = "Fail";
            }

            // Display output
            document.getElementById("output").innerHTML =
                "<h3>Result</h3>" +
                "<p><b>Total Marks:</b> " + total + "</p>" +
                "<p><b>Average Marks:</b> " + average.toFixed(2) + "</p>" +
                "<p><b>Grade:</b> " + grade + "</p>" +
                "<p><b>Result:</b> " + result + "</p>";
        }

    </script>

</body>
</html>
