<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bank Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 30px;
        }
        .container {
            max-width: 700px;
            margin: auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }
        h1, h2 {
            margin-top: 0;
        }
        .account {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
            background: #fafafa;
        }
        .account p {
            margin: 8px 0;
        }
        button {
            padding: 10px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .results {
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Bank Management System</h1>
    <div class="account" id="savingsAccount">
        <h2>Savings Account</h2>
        <p><strong>Account Number:</strong> 12345</p>
        <p><strong>Account Holder:</strong> Raghav</p>
        <p><strong>Balance:</strong> $<span id="savingsBalance">5000.00</span></p>
        <p><strong>Interest Rate:</strong> 12%</p>
        <button id="savingsInterestBtn">Calculate Interest</button>
        <p class="results" id="savingsInterestResult"></p>
    </div>
    <div class="account" id="currentAccount">
        <h2>Current Account</h2>
        <p><strong>Account Number:</strong> 67890</p>
        <p><strong>Account Holder:</strong> Pralav</p>
        <p><strong>Balance:</strong> $<span id="currentBalance">8000.00</span></p>
        <p><strong>Interest Rate:</strong> 5%</p>
        <button id="currentInterestBtn">Calculate Interest</button>
        <p class="results" id="currentInterestResult"></p>
    </div>
</div>
<script>
    class BankAccount {
        constructor(accountNumber, accountHolderName, balance) {
            this.accountNumber = accountNumber;
            this.accountHolderName = accountHolderName;
            this.balance = balance;
        }

        deposit(amount) {
            if (amount > 0) {
                this.balance += amount;
                return `Deposited: $${amount.toFixed(2)}`;
            }
            return 'Invalid deposit amount!';
        }

        calculateInterest() {
            return 0;
        }

        displayDetails() {
            return `Account Number: ${this.accountNumber}\n` +
                `Account Holder Name: ${this.accountHolderName}\n` +
                `Balance: $${this.balance.toFixed(2)}`;
        }
    }

    class SavingsAccount extends BankAccount {
        constructor(accountNumber, accountHolderName, balance) {
            super(accountNumber, accountHolderName, balance);
            this.interestRate = 0.12;
        }

        calculateInterest() {
            return this.balance * this.interestRate;
        }
    }

    class CurrentAccount extends BankAccount {
        constructor(accountNumber, accountHolderName, balance) {
            super(accountNumber, accountHolderName, balance);
            this.interestRate = 0.05;
        }

        calculateInterest() {
            return this.balance * this.interestRate;
        }
    }

    const savings = new SavingsAccount('12345', 'Raghav', 5000.0);
    const current = new CurrentAccount('67890', 'Pralav', 8000.0);

    document.getElementById('savingsInterestBtn').addEventListener('click', () => {
        const interest = savings.calculateInterest();
        document.getElementById('savingsInterestResult').textContent =
            `Interest: $${interest.toFixed(2)}`;
    });

    document.getElementById('currentInterestBtn').addEventListener('click', () => {
        const interest = current.calculateInterest();
        document.getElementById('currentInterestResult').textContent =
            `Interest: $${interest.toFixed(2)}`;
    });
</script>
</body>
</html>
